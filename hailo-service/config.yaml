name: "Hailo Service"
version: "4.23.0"
slug: hailo_service
description: >-
  HailoRT Multi-Process Service daemon for Hailo-8/8L.
  Enables multiple HA add-ons to share a single Hailo device.
arch:
  - aarch64
  - amd64
startup: system
stage: experimental
init: false
host_ipc: true
devices:
  - /dev/hailo0
map:
  - type: share
    read_only: false
options: {}
schema: {}
